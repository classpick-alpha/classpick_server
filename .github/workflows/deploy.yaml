name: Deploy to EC2

on:
  push:
    branches:
      - dev
      - refactor/daehyeon

jobs:
  build_image:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create application-prod.yaml from secret
        run: |
          echo "${{ secrets.APPLICATION_YAML }}" > src/main/resources/application-prod.yaml

      - name: Extract project version
        id: get_version
        run: |
          VERSION=$(./gradlew properties --no-daemon -q \
            | grep '^version:' \
            | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t backend .
          docker tag backend ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:${{ steps.get_version.outputs.version }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:${{ steps.get_version.outputs.version }}

  deploy_ec2:
    needs: build_image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:${{ needs.build_image.outputs.version }}
            docker stop classpick-server || true
            docker rm classpick-server || true
            docker run -d \
              --name classpick-server \
              --restart always \
              -p 8080:8080 \
              ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:${{ needs.build_image.outputs.version }}
