spring:
  config:
    import:
      - classpath:application.yml
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE:classpick_local}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: never
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

app:
  ocr:
    apikey: ${OCR_API_KEY}
  jwt:
    key: ${JWT_KEY}
  oauth:
    callback:
      success: ${FRONTEND_HOSTNAME}/auth/callback/success
      failure: ${FRONTEND_HOSTNAME}/auth/callback/failure
  cloud:
    aws:
      region: ap-northeast-2
      s3:
        bucket: ${AWS_S3_BUCKET}
      credential:
        accessKey: ${AWS_ACCESS_KEY}
        secretKey: ${AWS_SECRET_KEY}
